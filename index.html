<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital_FLotsam_reCAPTCHA</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, Helvetica, sans-serif;
    padding: 20px;
  }

  .captcha-widget {
    width: min(500px, 100%);
    background: #fff;
    border: 1px solid #d3d3d3;
    border-radius: 3px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* Header */
  .captcha-header {
    background: #4a90d9;
    padding: 10px 14px 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .captcha-header-text { flex: 1; }

  .captcha-header-title {
    color: #fff;
    font-size: 14px;
    font-weight: normal;
    line-height: 1.3;
    margin-bottom: 1px;
  }

  .captcha-header-keyword {
    color: #fff;
    font-size: 17px;
    font-weight: bold;
    line-height: 1.2;
  }

  .captcha-header-icon {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }

  /* Grid */
  .captcha-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    background: #ccc;
    border-top: 2px solid #ccc;
    border-bottom: 2px solid #ccc;
  }

  .captcha-cell {
    position: relative;
    aspect-ratio: 1;
    cursor: pointer;
    overflow: hidden;
    background: #e0e0e0;
  }

  .captcha-cell img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
  }

  .captcha-cell-overlay {
    position: absolute;
    inset: 0;
    background: rgba(74, 144, 217, 0.38);
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
  }

  .captcha-cell.selected .captcha-cell-overlay { opacity: 1; }

  .captcha-cell-tick {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 26px;
    height: 26px;
    opacity: 0;
    transition: opacity 0.1s;
    pointer-events: none;
  }

  .captcha-cell.selected .captcha-cell-tick { opacity: 1; }

  /* Loading shimmer */
  .captcha-cell.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #e0e0e0 25%, #ebebeb 50%, #e0e0e0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Footer */
  .captcha-footer {
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: #f9f9f9;
  }

  .captcha-footer-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .captcha-skip {
    font-size: 12px;
    color: #4a90d9;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    text-align: left;
  }
  .captcha-skip:hover { text-decoration: underline; }

  .captcha-count {
    font-size: 11px;
    color: #aaa;
    min-height: 14px;
  }

  .captcha-verify-btn {
    background: #4a90d9;
    color: #fff;
    border: none;
    border-radius: 3px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: bold;
    font-family: Arial, inherit;
    cursor: pointer;
    letter-spacing: 0.04em;
    white-space: nowrap;
    transition: background 0.1s;
  }
  .captcha-verify-btn:hover:not(:disabled) { background: #3a7fc9; }
  .captcha-verify-btn:disabled {
    background: #b0cfe8;
    cursor: not-allowed;
  }

  /* Brand bar */
  .captcha-brand {
    background: #f9f9f9;
    border-top: 1px solid #ebebeb;
    padding: 5px 12px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }

  .captcha-brand-text {
    font-size: 8px;
    color: #aaa;
    text-align: right;
    line-height: 1.4;
  }

  .captcha-brand-text strong { color: #888; }

  .captcha-brand-shield { width: 20px; height: 20px; }

  /* Thank you screen */
  .captcha-thanks {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px 24px;
    gap: 10px;
    text-align: center;
  }

  .captcha-thanks.active { display: flex; }

  .captcha-thanks-check {
    width: 46px;
    height: 46px;
    margin-bottom: 4px;
  }

  .captcha-thanks-title {
    font-size: 15px;
    font-weight: bold;
    color: #333;
  }

  .captcha-thanks-sub {
    font-size: 12px;
    color: #888;
    line-height: 1.6;
  }

  .captcha-again {
    margin-top: 6px;
    font-size: 12px;
    color: #4a90d9;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  .captcha-again:hover { text-decoration: underline; }

  /* Setup notice */
  .setup-notice {
    background: #fff8e1;
    border-bottom: 1px solid #ffe082;
    padding: 8px 12px;
    font-size: 11px;
    color: #666;
    line-height: 1.6;
    display: none;
  }
  .setup-notice code {
    background: #eee;
    padding: 1px 3px;
    border-radius: 2px;
    font-size: 10px;
  }
</style>
</head>
<body>

<div class="captcha-widget">

  <div class="setup-notice" id="setup-notice"></div>

  <!-- MAIN -->
  <div id="main-screen">
    <div class="captcha-header">
      <div class="captcha-header-text">
        <div class="captcha-header-title">Select all images that are</div>
        <div class="captcha-header-keyword" id="header-keyword">loading&hellip;</div>
      </div>
      <!-- 3x3 grid icon -->
      <svg class="captcha-header-icon" viewBox="0 0 38 38" fill="none">
        <rect x="2"  y="2"  width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="14" y="2"  width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="26" y="2"  width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="2"  y="14" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="14" y="14" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="26" y="14" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="2"  y="26" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="14" y="26" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
        <rect x="26" y="26" width="10" height="10" rx="1.5" fill="rgba(255,255,255,0.85)"/>
      </svg>
    </div>

    <div class="captcha-grid" id="grid"></div>

    <div class="captcha-footer">
      <div class="captcha-footer-left">
        <button class="captcha-skip" onclick="skipNone()">Skip &mdash; none apply</button>
        <div class="captcha-count" id="count-label"></div>
      </div>
      <button class="captcha-verify-btn" id="verify-btn" onclick="handleSubmit()" disabled>VERIFY</button>
    </div>

    <div class="captcha-brand">
      <div class="captcha-brand-text">
        <span>protected by</span><br>
        <strong>digitalFLOTSAM</strong>
      </div>
      <svg class="captcha-brand-shield" viewBox="0 0 20 20" fill="none">
        <path d="M10 1.5L3 4.5v4.75C3 13.1 6.1 16.8 10 18c3.9-1.2 7-4.9 7-8.75V4.5L10 1.5z" fill="#4a90d9" opacity="0.75"/>
        <path d="M7 10l2.2 2.2L13 7.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <!-- THANK YOU -->
  <div class="captcha-thanks" id="thanks-screen">
    <svg class="captcha-thanks-check" viewBox="0 0 46 46" fill="none">
      <circle cx="23" cy="23" r="21" fill="#e8f5e9"/>
      <path d="M13 23l7 7 13-13" stroke="#4caf50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="captcha-thanks-title">Verification complete</div>
    <div class="captcha-thanks-sub" id="thanks-sub"></div>
    <button class="captcha-again" onclick="startNewRound()">Try another &rarr;</button>
  </div>
</div>

 <div style="text-align:center; margin-top: 16px;">
  <a href="https://www.instagram.com/digital_flotsam/" target="_blank" 
     style="display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:#888; font-family:Arial, sans-serif; font-size:12px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="1" fill="#888" stroke="none"/>
    </svg>
    instagram
  </a>
</div>
 
<script>
// ═══════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════

// 1. Google Drive API key
//    Get one free at console.cloud.google.com → APIs & Services → Credentials
//    Enable the "Google Drive API", then restrict the key to your domain.
const GOOGLE_API_KEY = "AIzaSyDGsn2ZNksP7rIE1EeVvjznCgLml_XQz4s";

// 2. Google Drive folder ID
//    Open your folder in Drive, copy the ID from the URL:
//    https://drive.google.com/drive/folders/THIS_PART_HERE
//    Then share the folder → "Anyone with the link" → Viewer
const FOLDER_ID = "1QUPoNv9wu9SOF7OpKFb3SUC10uKAkquu";

// 3. Keywords shown to participants
const KEYWORDS = [
  "panicked",
  "confusing",
  "lost",
  "urgent",
  "angry",
  "sad",
  "active",
  "screaming",
  "galactic",
  "lonely",
  "yearning",
  "hazardous",
  "departing",
  "friends",
  "dissatisfied",
  "jealous",
  "lying",
  "resting",
  "alarming",
  "comforting",
  "on vacation",
  "waiting",
  "hungry",
  "amused",
  "for sale",
  "exposed",
  "baggy",
  "twisting",
  "arriving",
];

// 4. Google Apps Script URL for logging responses to Google Sheets
//    Leave as "" to run in demo mode (logs to browser console only)
//    Setup: Sheets → Extensions → Apps Script → paste the doPost function
//    → Deploy → New deployment → Web app → Anyone can access → copy URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw18dREQSaNXEa4GvBUdFU9XckEseSlWJN1oatKMiw2UtOPD0CbW0t36juNtPWbtEWTVQ/exec";

// ═══════════════════════════════════════════════════════
//  APP — no need to edit below
// ═══════════════════════════════════════════════════════

let allImages   = [];
let currentImages = [];
let currentKeyword = "";
let selected    = new Set();
let submitting  = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function driveThumbUrl(fileId) {
  return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`;
}

function showNotice(html) {
  const el = document.getElementById('setup-notice');
  el.innerHTML = html;
  el.style.display = 'block';
}

// ── Load images from Drive ────────────────────────────

async function loadImages() {
  if (!GOOGLE_API_KEY || !FOLDER_ID) {
    showNotice(`<strong>Demo mode:</strong> add your <code>GOOGLE_API_KEY</code> and <code>FOLDER_ID</code> to load your real archive.`);
    allImages = Array.from({length: 36}, (_, i) => ({
      id: `demo-${i}`,
      url: `https://picsum.photos/seed/${i + 40}/400/400`,
    }));
    return;
  }

  try {
    let files = [], pageToken = null;
    do {
      let url = `https://www.googleapis.com/drive/v3/files`
        + `?q=${encodeURIComponent(`'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed=false`)}`
        + `&fields=nextPageToken,files(id,name)`
        + `&pageSize=1000`
        + `&key=${GOOGLE_API_KEY}`;
      if (pageToken) url += `&pageToken=${encodeURIComponent(pageToken)}`;

      const res  = await fetch(url);
      if (!res.ok) throw new Error(`Drive API responded with ${res.status} — check your API key and folder permissions.`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      files     = files.concat(data.files || []);
      pageToken = data.nextPageToken || null;
    } while (pageToken);

    if (!files.length) throw new Error('No image files found in that folder. Make sure the folder is shared publicly.');

    allImages = files.map(f => ({ id: f.id, name: f.name, url: driveThumbUrl(f.id) }));

  } catch (err) {
    showNotice(`<strong>Drive error:</strong> ${err.message}`);
    allImages = Array.from({length: 36}, (_, i) => ({
      id: `demo-${i}`,
      url: `https://picsum.photos/seed/${i + 40}/400/400`,
    }));
  }
}

// ── Round ─────────────────────────────────────────────

function startNewRound() {
  selected.clear();
  submitting = false;

  currentImages = preloadedImages.length > 0
    ? preloadedImages
    : shuffle(allImages).slice(0, Math.min(9, allImages.length));
  preloadedImages = [];

  const pool = KEYWORDS.filter(k => k !== currentKeyword);
  currentKeyword = pool[Math.floor(Math.random() * pool.length)];
 
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('thanks-screen').classList.remove('active');
  document.getElementById('header-keyword').textContent = currentKeyword;
  document.getElementById('verify-btn').textContent = 'VERIFY';

  renderGrid();
  updateFooter();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  currentImages.forEach(img => {
    const cell = document.createElement('div');
    cell.className = 'captcha-cell loading';

    const image = document.createElement('img');
    image.alt = '';
    image.draggable = false;
    image.onload  = () => cell.classList.remove('loading');
    image.onerror = () => cell.classList.remove('loading');
    image.src = img.url;

    const overlay = document.createElement('div');
    overlay.className = 'captcha-cell-overlay';

    const tick = document.createElement('div');
    tick.className = 'captcha-cell-tick';
    tick.innerHTML = `<svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <circle cx="13" cy="13" r="12" fill="#4a90d9"/>
      <path d="M7.5 13l4 4L18.5 8.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    cell.append(image, overlay, tick);
    cell.addEventListener('click', () => toggleCell(img.id, cell));
    grid.appendChild(cell);
  });
}

function toggleCell(id, cell) {
  if (selected.has(id)) { selected.delete(id); cell.classList.remove('selected'); }
  else                  { selected.add(id);    cell.classList.add('selected');    }
  updateFooter();
}

function updateFooter() {
  const n   = selected.size;
  const btn = document.getElementById('verify-btn');
  document.getElementById('count-label').textContent =
    n === 0 ? '' : n === 1 ? '1 selected' : `${n} selected`;
  btn.disabled = submitting || n === 0;
}

function skipNone() {
  selected.clear();
  document.querySelectorAll('.captcha-cell.selected')
          .forEach(c => c.classList.remove('selected'));
  updateFooter();
  handleSubmit(true);
}

// ── Submit ────────────────────────────────────────────

async function handleSubmit(noneApply = false) {
  if (submitting) return;
  submitting = true;
  const btn = document.getElementById('verify-btn');
  btn.disabled  = true;
  btn.textContent = '…';

  const payload = {
    timestamp:   new Date().toISOString(),
    keyword:     currentKeyword,
    shown:       currentImages.map(i => i.id).join(','),
    shownNames:  currentImages.map(i => i.name).join(','),
    tagged:      noneApply ? '' : [...selected].join(','),
    taggedNames: noneApply ? '' : [...selected].map(id => currentImages.find(i => i.id === id)?.name || id).join(','),
    tagged_count: noneApply ? 0 : selected.size,
    shown_count:  currentImages.length,
  };

  // Show thank you immediately — don't wait for the network
  showThanks(payload.tagged_count, noneApply);

  // Send data in the background
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    }).catch(e => console.warn('Submit error:', e));
  } else {
    console.log('[Demo] Submission:', payload);
  }
}

let preloadedImages = [];

function preloadNextRound() {
  const nextImages = shuffle(allImages).slice(0, Math.min(9, allImages.length));
  preloadedImages = nextImages;
  nextImages.forEach(img => {
    const image = new Image();
    image.src = img.url;
  });
}

function showThanks(n, noneApply) {
  document.getElementById('main-screen').style.display = 'none';
  const screen = document.getElementById('thanks-screen');
  screen.classList.add('active');
  document.getElementById('thanks-sub').innerHTML =
    (noneApply || n === 0)
      ? `No images matched <strong>${currentKeyword}</strong>.`
      : `${n} image${n > 1 ? 's' : ''} tagged as <strong>${currentKeyword}</strong>.`;
  
  // Silently preload next round while user reads the thank you screen
  preloadNextRound();
}
// ── Boot ──────────────────────────────────────────────

(async () => {
  // Show skeleton grid while loading
  const grid = document.getElementById('grid');
  for (let i = 0; i < 9; i++) {
    const c = document.createElement('div');
    c.className = 'captcha-cell loading';
    grid.appendChild(c);
  }

  await loadImages();
  startNewRound();
})();
</script>
</body>
</html>
